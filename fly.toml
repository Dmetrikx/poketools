# fly.toml app configuration file generated for poketools-k5-rwq on 2026-03-10T02:29:14-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'poketools-k5-rwq'
primary_region = 'lax'

[build]

[env]
  DATABASE_PATH = '/data/poketools.db'
  ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'poketools_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
